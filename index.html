<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Haber Akışı</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg: #fdfcf8;
            --surface: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #4a4a4a;
            --text-muted: #8c8c8c;
            --accent: #c41e3a;
            --accent-soft: #fef0f0;
            --border: #e0dbd0;
            --border-light: #ede8df;
            --rule: #1a1a1a;
            --input-bg: #faf9f5;
            --modal-bg: #fdfcf8;
            --overlay: rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Lora', 'Georgia', serif;
            background: var(--bg);
            color: var(--text);
            max-width: 480px;
            margin: 0 auto;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .sticky-header { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--bg); z-index: 100; }
        .masthead { text-align: center; padding: 10px 16px 8px; border-bottom: 2px solid var(--rule); cursor: pointer; transition: opacity 0.2s; }
        .masthead:active { opacity: 0.7; }
        .masthead-date { font-family: 'Inter', sans-serif; font-size: 0.5rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 3px; }
        .masthead-title { font-family: 'Playfair Display', 'Georgia', serif; font-size: 1.6rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1; color: var(--text); }
        .masthead-title .accent { color: var(--accent); font-style: italic; }
        .masthead-subtitle { font-family: 'Inter', sans-serif; font-size: 0.45rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); margin-top: 3px; }
        .masthead-rule { width: 100%; height: 1px; background: var(--rule); margin-top: 8px; opacity: 0.4; }

        .action-bar { display: flex; align-items: center; justify-content: space-between; padding: 6px 16px; border-bottom: 1px solid var(--border-light); background: var(--bg); }
        .btn-gazette { height: 28px; padding: 0 10px; border: 1px solid var(--rule); background: transparent; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.5rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all 0.15s ease; }
        .btn-gazette:active { background: var(--text); color: var(--bg); transform: scale(0.96); }
        .btn-gazette.icon-only { width: 28px; padding: 0; justify-content: center; }
        .action-right { display: flex; gap: 4px; }
        .action-left-text { font-family: 'Inter', sans-serif; font-size: 0.5rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }

        .category-nav { display: flex; gap: 0; overflow-x: auto; border-bottom: 1px solid var(--border-light); background: var(--bg); }
        .category-nav::-webkit-scrollbar { display: none; }
        .nav-item { font-family: 'Inter', sans-serif; font-size: 0.5rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; padding: 9px 12px; border: none; border-bottom: 2px solid transparent; background: transparent; color: var(--text-muted); white-space: nowrap; cursor: pointer; transition: all 0.2s ease; flex-shrink: 0; }
        .nav-item.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 700; }

        .scroll-area { position: fixed; top: 0; bottom: 58px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; z-index: 1; }

        .carousel-section { position: relative; border-bottom: 2px solid var(--rule); background: #000; width: 100%; }
        .carousel-container { position: relative; width: 100%; height: 340px; overflow: hidden; }
        .carousel-track { display: flex; height: 100%; transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .carousel-card { flex-shrink: 0; width: 100%; height: 100%; position: relative; cursor: pointer; }
        .carousel-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .carousel-card .card-gradient { position: absolute; bottom: 0; left: 0; right: 0; height: 58%; background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.35) 50%, transparent 100%); pointer-events: none; }
        .carousel-card .card-body { position: absolute; bottom: 0; left: 0; right: 0; padding: 14px 18px 18px; color: #fff; }
        .carousel-card .card-kicker { font-family: 'Inter', sans-serif; font-size: 0.48rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #ff6b6b; margin-bottom: 4px; }
        .carousel-card .card-headline { font-family: 'Playfair Display', 'Georgia', serif; font-size: 1.1rem; font-weight: 800; line-height: 1.2; letter-spacing: -0.01em; margin-bottom: 4px; }
        .carousel-card .card-dek { font-size: 0.7rem; line-height: 1.35; opacity: 0.82; font-style: italic; }
        .carousel-card .card-meta { font-family: 'Inter', sans-serif; font-size: 0.45rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; opacity: 0.65; margin-top: 6px; display: flex; align-items: center; gap: 6px; }

        .carousel-nav { position: absolute; top: 50%; transform: translateY(-50%); width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.5); background: rgba(0, 0, 0, 0.55); backdrop-filter: blur(8px); color: #fff; font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; transition: all 0.2s ease; }
        .carousel-nav:active { background: rgba(255, 255, 255, 0.3); transform: translateY(-50%) scale(0.85); }
        .carousel-nav.prev { left: 8px; }
        .carousel-nav.next { right: 8px; }
        .carousel-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 10; }
        .carousel-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255, 255, 255, 0.4); transition: all 0.3s ease; }
        .carousel-dot.active { background: #fff; width: 14px; border-radius: 3px; }
        .carousel-counter { position: absolute; top: 10px; right: 12px; font-family: 'Inter', sans-serif; font-size: 0.55rem; font-weight: 600; color: #fff; background: rgba(0, 0, 0, 0.55); backdrop-filter: blur(8px); padding: 3px 10px; border-radius: 10px; z-index: 10; }
        .carousel-empty { text-align: center; padding: 30px 20px; background: var(--bg); color: var(--text-muted); font-style: italic; font-size: 0.85rem; border-bottom: 2px solid var(--rule); }

        .section-flag { display: flex; align-items: center; gap: 12px; padding: 14px 20px 10px; border-bottom: 1px solid var(--border-light); background: var(--bg); }
        .section-flag-text { font-family: 'Inter', sans-serif; font-size: 0.52rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text); white-space: nowrap; }
        .section-flag-rule { flex: 1; height: 1px; background: var(--border-light); }

        .story-list-item { display: flex; align-items: flex-start; gap: 12px; padding: 13px 20px; border-bottom: 1px solid var(--border-light); cursor: pointer; transition: background 0.15s ease; background: var(--bg); }
        .story-list-item:active { background: var(--accent-soft); }
        .list-item-number { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 900; color: var(--accent); line-height: 1; min-width: 24px; flex-shrink: 0; opacity: 0.5; }
        .list-item-content { flex: 1; min-width: 0; }
        .list-item-kicker { font-family: 'Inter', sans-serif; font-size: 0.46rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); margin-bottom: 2px; }
        .list-item-headline { font-family: 'Playfair Display', 'Georgia', serif; font-size: 0.84rem; font-weight: 600; line-height: 1.3; letter-spacing: -0.01em; }
        .list-item-meta { font-family: 'Inter', sans-serif; font-size: 0.46rem; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-muted); margin-top: 4px; }

        .input-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; padding: 8px 16px 12px; background: var(--bg); border-top: 2px solid var(--rule); display: flex; gap: 8px; align-items: center; z-index: 100; }
        .input-wrapper { flex: 1; display: flex; align-items: center; background: var(--input-bg); border: 1px solid var(--border); padding: 0 14px; transition: border-color 0.2s ease; }
        .input-wrapper:focus-within { border-color: var(--text); }
        .input-wrapper input { flex: 1; padding: 12px 0; border: none; background: transparent; color: var(--text); font-family: 'Lora', 'Georgia', serif; font-size: 0.82rem; outline: none; }
        .input-wrapper input::placeholder { color: var(--text-muted); font-style: italic; font-size: 0.76rem; }
        .btn-send { width: 42px; height: 42px; border: 1px solid var(--text); background: var(--text); color: var(--bg); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s ease; }
        .btn-send:active { background: var(--accent); border-color: var(--accent); color: #fff; transform: scale(0.94); }

        .load-more-area { text-align: center; padding: 20px 20px 30px; }
        .btn-load-more { font-family: 'Inter', sans-serif; font-size: 0.5rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 14px 30px; border: 2px solid var(--rule); background: transparent; color: var(--text); cursor: pointer; transition: all 0.2s ease; }
        .btn-load-more:active { background: var(--text); color: var(--bg); }

        .modal-overlay { position: fixed; inset: 0; background: var(--overlay); z-index: 500; display: none; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal-container { width: 100%; max-width: 480px; height: 100vh; background: var(--modal-bg); display: flex; flex-direction: column; overflow: hidden; animation: modalIn 0.3s ease forwards; }
        @keyframes modalIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .modal-header { padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--rule); flex-shrink: 0; }
        .modal-header h2 { font-family: 'Inter', sans-serif; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text); display: flex; align-items: center; gap: 8px; }
        .btn-modal-close { width: 30px; height: 30px; border: 1px solid var(--rule); background: transparent; color: var(--text); font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s ease; }
        .btn-modal-close:active { background: var(--text); color: var(--bg); }
        .modal-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
        .modal-footer { padding: 14px 20px 20px; border-top: 1px solid var(--border-light); flex-shrink: 0; display: flex; gap: 10px; }
        .btn-full { font-family: 'Inter', sans-serif; font-size: 0.52rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 14px; border: 2px solid var(--rule); background: transparent; color: var(--text); cursor: pointer; width: 100%; text-align: center; transition: all 0.2s ease; }
        .btn-full:active { background: var(--text); color: var(--bg); }
        .btn-full.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn-full.danger { border-color: var(--accent); color: var(--accent); }
        .btn-full.danger:active { background: var(--accent); color: #fff; }

        .ai-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; animation: pulse-dot 2s infinite; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .modal-body.chat-body { display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 14px 18px; font-size: 0.84rem; line-height: 1.65; max-width: 85%; animation: msgIn 0.25s ease forwards; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .msg.ai { background: var(--surface); border: 1px solid var(--border-light); align-self: flex-start; font-family: 'Lora', 'Georgia', serif; }
        .msg.user { background: var(--text); color: var(--bg); align-self: flex-end; font-family: 'Inter', sans-serif; font-size: 0.78rem; }

        .typing-dots { display: flex; gap: 3px; padding: 4px 0; }
        .typing-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--text-muted); animation: dotBounce 1.4s infinite ease-in-out; }
        .typing-dots span:nth-child(1) { animation-delay: 0s; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotBounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }

        .modal-footer-input { padding: 10px 16px 16px; border-top: 1px solid var(--border-light); display: flex; gap: 8px; flex-shrink: 0; background: var(--modal-bg); }
        .modal-footer-input input { flex: 1; padding: 13px 16px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: 'Lora', 'Georgia', serif; font-size: 0.84rem; outline: none; }
        .modal-footer-input input:focus { border-color: var(--text); }
        .modal-footer-input input::placeholder { color: var(--text-muted); font-style: italic; font-size: 0.78rem; }

        .set-row { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        .set-label { font-family: 'Inter', sans-serif; font-size: 0.5rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
        .set-ctrl { display: flex; align-items: center; border: 1px solid var(--rule); height: 48px; overflow: hidden; }
        .set-ctrl button { flex: 1; height: 100%; border: none; background: transparent; font-size: 1.2rem; font-weight: 600; cursor: pointer; color: var(--text); transition: all 0.15s ease; font-family: 'Inter', sans-serif; }
        .set-ctrl button:active { background: var(--text); color: var(--bg); }
        .set-ctrl span { flex: 2; text-align: center; font-weight: 600; font-size: 0.85rem; border-left: 1px solid var(--rule); border-right: 1px solid var(--rule); display: flex; align-items: center; justify-content: center; color: var(--text); font-family: 'Inter', sans-serif; }

        .rss-item { padding: 14px 16px; border: 1px solid var(--border-light); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; background: var(--surface); }
        .rss-item-info strong { font-family: 'Inter', sans-serif; font-size: 0.6rem; font-weight: 600; display: block; color: var(--text); }
        .rss-item-info span { font-family: 'Inter', sans-serif; font-size: 0.45rem; color: var(--accent); letter-spacing: 0.05em; text-transform: uppercase; }
        .rss-item-actions { display: flex; gap: 8px; }
        .rss-item-actions button { font-family: 'Inter', sans-serif; font-size: 0.5rem; font-weight: 600; padding: 6px 12px; border: 1px solid var(--rule); background: transparent; color: var(--text); cursor: pointer; letter-spacing: 0.04em; text-transform: uppercase; transition: all 0.15s ease; }
        .rss-item-actions button:active { background: var(--text); color: var(--bg); }
        .rss-item-actions button.danger { border-color: var(--accent); color: var(--accent); }

        .saved-item { padding: 14px 20px; border-bottom: 1px solid var(--border-light); cursor: pointer; transition: background 0.15s ease; position: relative; }
        .saved-item:active { background: var(--accent-soft); }
        .saved-item .saved-source { font-family: 'Inter', sans-serif; font-size: 0.45rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent); margin-bottom: 3px; }
        .saved-item .saved-title { font-family: 'Playfair Display', 'Georgia', serif; font-size: 0.82rem; font-weight: 600; line-height: 1.3; }
        .btn-delete-saved { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); width: 28px; height: 28px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s ease; }
        .btn-delete-saved:active { background: var(--accent); color: #fff; }

        .top-bar { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: rgba(253, 252, 248, 0.9); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--border-light); }
        .top-bar-left { display: flex; align-items: center; gap: 8px; }
        .btn-back { width: 34px; height: 34px; border: 1px solid var(--rule); background: transparent; color: var(--text); font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s ease; }
        .btn-back:active { background: var(--text); color: var(--bg); }
        .source-badge { font-family: 'Inter', sans-serif; font-size: 0.5rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 10px; border: 1px solid var(--accent); color: var(--accent); }
        .top-bar-right { display: flex; gap: 4px; position: relative; }
        .btn-icon { width: 34px; height: 34px; border: 1px solid var(--rule); background: transparent; color: var(--text); font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s ease; }
        .btn-icon:active { background: var(--text); color: var(--bg); }
        .btn-star { color: #e5b73b; border-color: #e5b73b; font-size: 1rem; }
        .btn-star.saved { background: #e5b73b; color: #fff; }
        .dropdown-menu { position: absolute; top: 40px; right: 0; background: var(--modal-bg); border: 1px solid var(--rule); z-index: 200; min-width: 160px; display: none; flex-direction: column; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12); }
        .dropdown-menu.show { display: flex; }
        .dropdown-item { font-family: 'Inter', sans-serif; font-size: 0.55rem; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; padding: 12px 16px; border-bottom: 1px solid var(--border-light); background: transparent; color: var(--text); cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.1s ease; border: none; text-align: left; width: 100%; }
        .dropdown-item:last-child { border-bottom: none; }
        .dropdown-item:active { background: var(--accent-soft); }
        .dropdown-item .icon { font-size: 0.8rem; width: 20px; text-align: center; }

        .article { padding: 0 20px 100px; }
        .article-image { width: calc(100% + 40px); margin-left: -20px; height: 180px; object-fit: cover; display: block; background: var(--border-light); }
        .article-category { font-family: 'Inter', sans-serif; font-size: 0.48rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-top: 20px; margin-bottom: 8px; }
        .article-title { font-family: 'Playfair Display', 'Georgia', serif; font-size: 1.0rem; font-weight: 800; line-height: 1.25; letter-spacing: -0.01em; margin-bottom: 10px; }
        .article-meta { display: flex; align-items: center; gap: 8px; font-family: 'Inter', sans-serif; font-size: 0.5rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 18px; }
        .article-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text-muted); }
        .article-rule { width: 100%; height: 2px; background: var(--rule); margin-bottom: 20px; opacity: 0.6; }
        .article-body-text { font-size: 0.95rem; line-height: 1.85; color: var(--text-secondary); }
        .article-body-text p { margin-bottom: 16px; }

        .fab { position: fixed; bottom: 28px; right: 50%; transform: translateX(calc(240px - 32px)); width: 52px; height: 52px; border-radius: 50%; border: none; background: var(--text); color: var(--bg); font-size: 1.3rem; cursor: pointer; z-index: 150; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15); transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .fab:active { transform: translateX(calc(240px - 32px)) scale(0.9); }

        .sheet-overlay { position: fixed; inset: 0; background: var(--overlay); z-index: 500; opacity: 0; pointer-events: none; transition: opacity 0.35s ease; }
        .sheet-overlay.active { opacity: 1; pointer-events: auto; }
        .bottom-sheet { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%); width: 100%; max-width: 480px; height: 55vh; background: var(--modal-bg); border-top: 2px solid var(--rule); z-index: 600; transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); display: flex; flex-direction: column; overflow: hidden; }
        .bottom-sheet.active { transform: translateX(-50%) translateY(0); }
        .sheet-header { padding: 14px 20px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-light); flex-shrink: 0; }
        .sheet-header h3 { font-family: 'Inter', sans-serif; font-size: 0.55rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text); }
        .sheet-close { width: 28px; height: 28px; border: 1px solid var(--rule); background: transparent; color: var(--text); font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .sheet-body { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
        .chip-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .chip { font-family: 'Inter', sans-serif; font-size: 0.5rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; padding: 7px 14px; border: 1px solid var(--rule); background: transparent; color: var(--text); cursor: pointer; transition: all 0.15s ease; }
        .chip:active { background: var(--text); color: var(--bg); }

        .search-count { font-family: 'Inter', sans-serif; font-size: 0.5rem; font-weight: 600; color: var(--accent); padding: 8px 20px; border-bottom: 1px solid var(--border-light); }
        .search-result-item { padding: 14px 20px; border-bottom: 1px solid var(--border-light); cursor: pointer; transition: background 0.15s ease; display: flex; align-items: flex-start; gap: 10px; }

async function fetchAllNews() {
    news = [];
    const proxyUrl = "https://wild-sky-08d7.06mmt8129.workers.dev/?url=";
    
    const cachedData = localStorage.getItem('haberai_news_cache');
    const cacheTime = localStorage.getItem('haberai_news_time');

    const birSaat = 60 * 60 * 1000;

    if (cachedData && cacheTime && (now - cacheTime < birSaat)) {
        news = JSON.parse(cachedData);
        renderAll();
        return;
    }

    if (Object.keys(rssListesi).length === 0) {

    document.getElementById('newsListMount').innerHTML = '<div style="text-align:center;padding:50px;color:var(--text-muted);font-style:italic;">Haberler yükleniyor...</div>';

    for (const id in rssListesi) {
        const rss = rssListesi[id];

if (disabledSources.includes(id)) continue;

        try {
            const response = await fetch(proxyUrl + encodeURIComponent(rss.url));
            const xmlText = await response.text();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "text/xml");
            const items = xmlDoc.querySelectorAll("item, entry");

            items.forEach((el) => {
                const title = el.querySelector("title")?.textContent || "";
                let link = el.querySelector("link")?.textContent || el.querySelector("link")?.getAttribute("href") || "";
                const date = el.querySelector("pubDate")?.textContent || el.querySelector("dc\\:date")?.textContent || el.querySelector("date")?.textContent || "";

                // Gelişmiş resim bulma
                let img = "";
                const mediaContent = el.querySelector("media\\:content") || el.getElementsByTagNameNS("http://search.yahoo.com/mrss/", "content")[0];
                if (mediaContent) img = mediaContent.getAttribute("url") || mediaContent.getAttribute("src") || "";
                
                if (!img) {
                    const mediaThumb = el.querySelector("media\\:thumbnail") || el.getElementsByTagNameNS("http://search.yahoo.com/mrss/", "thumbnail")[0];
                    if (mediaThumb) img = mediaThumb.getAttribute("url") || mediaThumb.getAttribute("src") || "";
                }
                
                if (!img) {
                    const enclosure = el.querySelector("enclosure");
                    if (enclosure && enclosure.getAttribute("type")?.startsWith("image/")) img = enclosure.getAttribute("url") || "";
                }
                
                if (!img) {
                    const contentEncoded = el.querySelector("content\\:encoded") || el.getElementsByTagNameNS("http://purl.org/rss/1.0/modules/content/", "encoded")[0];
                    if (contentEncoded?.textContent) {
                        const imgRegex = /<img[^>]+src=["']([^"']+)["'][^>]*>/gi;
                        const matches = [...contentEncoded.textContent.matchAll(imgRegex)];
                        for (const match of matches) {
                            if (!match[1].includes('icon') && !match[1].includes('logo') && !match[1].includes('avatar')) { img = match[1]; break; }
                        }
                        if (!img && matches.length > 0) img = matches[0][1];
                    }
                }
                
                if (!img) {
                    const description = el.querySelector("description");
                    if (description?.textContent) {
                        let descText = description.textContent.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"').replace(/&amp;/g, '&');
                        const imgRegex = /<img[^>]+src=["']([^"']+)["'][^>]*>/gi;
                        const matches = [...descText.matchAll(imgRegex)];
                        for (const match of matches) {
                            const imgUrl = match[1];
                            if (imgUrl && !imgUrl.includes('data:image') && !imgUrl.includes('icon')) { img = imgUrl; break; }
                        }
                        if (!img) {
                            const urlMatch = descText.match(/(https?:\/\/[^\s"']+\.(jpg|jpeg|png|gif|webp))/i);
                            if (urlMatch) img = urlMatch[1];
                        }
                    }
                }
                
                if (img) {
                    img = img.replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"').replace(/&#039;/g, "'");
                    img = img.replace(/['"]/g, '');
                    if (img.startsWith('http:')) img = 'https:' + img.substring(5);
                    if (img.startsWith('/')) {
                        try {
                            const baseUrl = new URL(rss.url).origin;
                            img = baseUrl + img;
                        } catch (e) {
                            const domainMatch = rss.url.match(/^(https?:\/\/[^\/]+)/);
                            if (domainMatch) img = domainMatch[1] + img;
                        }
                    }
                }

                const defaultLogo = rss.logo || "https://mmt8129.github.io/Gem/rsslogo.png";
                const description = el.querySelector("description")?.textContent || "";
                const cleanDesc = description.replace(/<[^>]*>?/gm, '').trim().substring(0, 150) + "...";

                    news.push({
                        id: 'n' + Date.now() + Math.random().toString(36).substr(2, 5),
                        title: title.trim(),
                        link: link.trim(),
                        source: rss.ad,
                        category: rss.kategori || "GÜNDEM",
                        pubDate: date,
                        date: date,
                        thumbnail: img || defaultLogo,
                        image: img || defaultLogo,
                        description: description,
                        kicker: rss.ad,
                        dek: cleanDesc,
                        isTop: false,
                        isFlash: false
                    });
                }
            });
        } catch (e) {
            // Sessizce devam et
        }
    }

    // Haberleri karıştır
    news.sort(() => Math.random() - 0.5);
    
    // Önbelleğe al
    localStorage.setItem('haberai_news_cache', JSON.stringify(news));
    localStorage.setItem('haberai_news_time', new Date().getTime());
    
    // Render et
    renderAll();
}

        function initCarousel(total) {
            clearInterval(carouselTimer);
            const container = document.getElementById('carouselContainer');
            if (!container) return;
            let touchStart = 0;
            container.addEventListener('touchstart', e => { touchStart = e.touches[0].clientX;
                clearInterval(carouselTimer); }, { passive: true });
            container.addEventListener('touchend', e => { const diff = touchStart - e.changedTouches[0].clientX; if (Math.abs(
                    diff) > 40) diff > 0 ? nextSlide() : prevSlide();
                startTimer(); }, { passive: true });
            window.nextSlide = () => { carouselIndex = (carouselIndex + 1) % total;
                updateCarouselUI(total); };
            window.prevSlide = () => { carouselIndex = (carouselIndex - 1 + total) % total;
                updateCarouselUI(total); };
            function startTimer() { clearInterval(carouselTimer);
                carouselTimer = setInterval(() => nextSlide(), 7000); }
            startTimer();
        }

        function updateCarouselUI(total) {
            const track = document.getElementById('carouselTrack');
            const dots = document.querySelectorAll('#carouselDots .carousel-dot');
            const counter = document.getElementById('carouselCounter');
            if (track) track.style.transform = `translateX(-${carouselIndex * 100}%)`;
            dots.forEach((d, i) => d.classList.toggle('active', i === carouselIndex));
            if (counter) counter.textContent = `${carouselIndex + 1} / ${total}`;
        }

            method: 'POST',

                contents: memory,

                generationConfig: { temperature: 0.7, maxOutputTokens: 2048 }
            })
        });
        const data = await response.json();
        let cevap = 'Üzgünüm, bir hata oluştu.';
        if (data.candidates && data.candidates[0] && data.candidates[0].content) {
            cevap = data.candidates[0].content.parts[0].text || cevap;
        }
        const temizCevap = metniTemizle(cevap);
        const typing = document.getElementById(typingId);
        if (typing) typing.remove();
        body.innerHTML += `<div class="msg ai">${temizCevap}</div>`;
        chatHistory.push({ role: 'ai', text: temizCevap });
        if (chatHistory.length > 10) chatHistory.splice(0, 2);
        localStorage.setItem('haberai_ai_history', JSON.stringify(chatHistory));

        // Sohbeti kaydedilenlere ekle (HER ZAMAN)
        const savedItem = {
            title: '💬 AI Sohbet: ' + text.substring(0, 50),

            dek: text.substring(0, 100),
            isSavedChat: true,
            savedAt: new Date().toISOString()
        };
        
        // Aynı başlıkta varsa güncelle, yoksa ekle
        const existingIdx = savedNews.findIndex(s => s.isSavedChat);
        if (existingIdx !== -1) {
            savedNews[existingIdx] = savedItem;
        } else {

        }
        localStorage.setItem('haberai_saved', JSON.stringify(savedNews));

}

    const chatBody = document.getElementById('detailChatBody');
    
    if (detailChat.length === 0) {
        chatBody.innerHTML = '<div class="chat-msg ai">Bu haber hakkında ne öğrenmek istersin?<div class="chip-row"><button class="chip" onclick="askDetailAI(\'Bu haberi kısa ve açıklayıcı şekilde maddeler halinde özetle.\')">Haberi Özetle</button></div></div>';
    } else {
        chatBody.innerHTML = detailChat.map(m => `<div class="chat-msg ${m.role}">${m.text}</div>`).join('');
    }
    
    setTimeout(() => document.getElementById('detailChatInput').focus(), 400);
    pushModal('detailSheet');
}

        function closeDetailSheet(useStack = true) { document.getElementById('detailSheet').classList.remove('active');
            document.getElementById('detailSheetOverlay').classList.remove('active');
            document.getElementById('detailFab').style.display = 'flex';
            document.body.style.overflow = '';
            if (useStack) popModal(); }

        async function sendDetailMessage() { const inp = document.getElementById('detailChatInput');
            const text = inp.value.trim(); if (!text || !currentDetailNews) return;
            const body = document.getElementById('detailChatBody');
            body.innerHTML += `<div class="chat-msg user">${text}</div>`;
            inp.value = '';
            const typingId = 'dtyping-' + Date.now();
            body.innerHTML +=
                `<div class="chat-msg ai" id="${typingId}"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
            body.scrollTo({ top: body.scrollHeight, behavior: 'smooth' });

            const contextPrompt =
                `Haber: ${currentDetailNews.title}\n\n${currentDetailNews.description || ''}\n\nSoru: ${text}`;

            try {
                const response = await fetch(`${GEMINI_URL}?key=${decryptAPIKey(ENCRYPTED_KEY)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: 'user', parts: [{ text: contextPrompt }] }],
                        tools: [{ googleSearch: {} }],
                        generationConfig: { temperature: 0.7, maxOutputTokens: 2048 }
                    })
                });
                const data = await response.json();
                let cevap = 'Üzgünüm, bir hata oluştu.';
                if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                    cevap = data.candidates[0].content.parts[0].text || cevap;
                }
                const temizCevap = metniTemizle(cevap);
                const typing = document.getElementById(typingId);
                if (typing) typing.remove();
                body.innerHTML += `<div class="chat-msg ai">${temizCevap}</div>`;
                body.scrollTo({ top: body.scrollHeight, behavior: 'smooth' });
                
                // Sohbeti bu habere özel kaydet
const detailChatKey = 'detail_chat_' + (currentDetailNews?.id || '0');
const detailChat = JSON.parse(localStorage.getItem(detailChatKey) || '[]');
detailChat.push({ role: 'user', text: text });
detailChat.push({ role: 'ai', text: temizCevap });
if (detailChat.length > 20) detailChat.splice(0, 4);
localStorage.setItem(detailChatKey, JSON.stringify(detailChat));
                
            } catch (e) {
                const typing = document.getElementById(typingId);
                if (typing) typing.remove();
                body.innerHTML += '<div class="chat-msg ai">Bağlantı hatası! 😕</div>';
                body.scrollTo({ top: body.scrollHeight, behavior: 'smooth' });
            }
        }

        function askDetailAI(prompt) { document.getElementById('detailChatInput').value = prompt;
            sendDetailMessage(); }

        // ==================== TOAST ====================
        function showToast(msg) { const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.opacity = '1';
            clearTimeout(window._toastTimer);
            window._toastTimer = setTimeout(() => { toast.style.opacity = '0'; }, 2000); }

        // ==================== KEYBOARD ====================
        document.addEventListener('keydown', (e) => { if (e.key === '/') { const a = document.activeElement; if (a !== document
                    .getElementById('mainInput') && a !== document.getElementById('aiInput') && a !== document.getElementById(
                        'detailChatInput')) { e.preventDefault();
                    document.getElementById('mainInput').focus(); } } if (e.key === 'Escape') { closeTopModal(); } });

        // ==================== INIT ====================
        updateSavedBadge();
        adjustScrollArea();
    </script>
</body>
</html>
