/* ========= RESET ========= */
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:var(--bg);
    color:var(--text);
    height:100vh;
    overflow:hidden;
}

/* ========= HEADER ========= */
.header{
    position:fixed;
    top:0;
    width:100%;
    height:70px;
    background:var(--header-bg);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border-bottom:1px solid var(--brd);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 16px;
    z-index:1001;
}

.header-left,.header-right{
    display:flex;
    gap:8px;
    flex:1;
}

.header-right{justify-content:flex-end;}
.header-center{text-align:center;flex:1.5;}

.time-text{
    font-size:1.3rem;
    font-weight:600;
}

.date-text{
    font-size:0.7rem;
    color:var(--muted);
    font-weight:500;
}

/* ========= ICON BUTON ========= */

.btn-icon.saved {
    background: #22c55e !important;
    color: white !important;
    box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
}

.btn-icon.saved:hover {
    transform: scale(1.1);
    box-shadow: 0 0 15px rgba(34, 197, 94, 0.7);
}

#savedBadge {
    animation: badgePop 0.3s ease;
}

.btn-icon.saved::after {
    content: '✓';
    position: absolute;
    top: -2px;
    right: -2px;
    font-size: 10px;
    background: white;
    color: #22c55e;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    border: 1px solid #22c55e;
}

.btn-icon.saved-outline {
    border: 2px solid #22c55e !important;
    box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.3);
    position: relative;
}

.btn-save.has-saved {
    position: relative;
}

.btn-save.has-saved::after {
    content: attr(data-count);
    position: absolute;
    top: -5px;
    right: -5px;
    background: #ef4444;
    color: white;
    font-size: 10px;
    font-weight: bold;
    padding: 2px 6px;
    border-radius: 12px;
    min-width: 18px;
    text-align: center;
}

.btn-icon{
    width:38px;
    height:38px;
    border-radius:50%;
    border:none;
    background: var(--btn-bg-light);
    cursor:pointer;
    font-size:1.1rem;
    transition: all 0.2s ease;
    color: var(--btn-text);
}

.btn-icon.size-btn {
    background: color-mix(in srgb, var(--size-color) 20%, transparent);
    color:  var(--size-color);
    border: 1px solid color-mix(in srgb, var(--size-color) 30%, transparent);
}

.btn-icon.weight-btn {
    background: color-mix(in srgb, var(--weight-color) 20%, transparent);
    color: var(--weight-color);
    border: 1px solid color-mix(in srgb, var(--weight-color) 30%, transparent);
}

.btn-icon.content-btn {
    background: color-mix(in srgb, var(--content-color) 20%, transparent);
    color: var(--content-color);
    border: 1px solid color-mix(in srgb, var(--content-color) 30%, transparent);
}

.btn-icon:hover {
    background: var(--btn-hover) !important;
    transform: scale(1.05);
}

@keyframes badgePop {
    0% { transform: scale(0); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

.btn-gemini{background:var(--primary)!important;color:#fff!important;border:none!important;}
.btn-save{background:var(--primary)!important;color:#fff!important;border:none!important;}

/* ========= ALT ARAMA BAR ========= */

}

    background: #2c2c2e;
}

.typing-indicator span {
    width: 8px;
    height: 8px;
    background: #888;
    border-radius: 50%;

}

.typing-indicator span:nth-child(1) { animation-delay: 0s; }
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {

// Haber detayında resimleri bul
function extractImagesFromNews(newsItem) {
    let images = [];
    
    // 1. Ana thumbnail varsa ekle
    if (newsItem.thumbnail && newsItem.thumbnail !== 'logo.png') {
        images.push(newsItem.thumbnail);
    }
    
    // 2. Açıklamadan resimleri bul
    if (newsItem.description) {
        const imgRegex = /<img[^>]+src="([^">]+)"/g;
        let match;
        while ((match = imgRegex.exec(newsItem.description)) !== null) {
            if (!images.includes(match[1])) {
                images.push(match[1]);
            }
        }
    }
    
    // 3. RSS'den gelen diğer resimler (eğer varsa)
    if (newsItem.images && Array.isArray(newsItem.images)) {
        newsItem.images.forEach(img => {
            if (!images.includes(img)) {
                images.push(img);
            }
        });
    }
    
    // Eğer hiç resim yoksa, varsayılan logo
    if (images.length === 0) {
        images.push('logo.png');
    }
    
    return images;
}

// Sıralama menüsünü aç
function openSortMenu() {
    // Varolan menüyü kaldır
    const existingMenu = document.getElementById('sortMenu');
    if (existingMenu) existingMenu.remove();
    
    // Menüyü oluştur
    const menu = document.createElement('div');
    menu.id = 'sortMenu';
    menu.className = 'sort-menu';
    
    const sortOptions = [
        { type: 'date', label: 'Tarihe Göre', icon: '📅', desc: '🔽 Yeniden Eskiye', asc: '🔼 Eskiden Yeniye' },
        { type: 'source', label: 'Kaynağa Göre', icon: '📰', desc: '🔽 Z\'den A\'ya', asc: '🔼 A\'dan Z\'ye' },
        { type: 'title', label: 'Başlığa Göre', icon: '📝', desc: '🔽 Z\'den A\'ya', asc: '🔼 A\'dan Z\'ye' }
    ];
    
    let menuHTML = '';
    sortOptions.forEach(opt => {
        const isActive = sortConfig.type === opt.type;
        const currentDir = isActive ? sortConfig.direction : 'desc';
        
        menuHTML += `
            <div class="sort-item ${isActive ? 'active' : ''}" onclick="changeSort('${opt.type}')">
                <span>${opt.icon}</span>
                <span style="flex:1;">${opt.label}</span>
                <span class="sort-icon" onclick="event.stopPropagation(); toggleSortDirection('${opt.type}')">
                    ${isActive ? (sortConfig.direction === 'desc' ? '🔽' : '🔼') : '🔽'}
                </span>
            </div>
        `;
    });
    
    menu.innerHTML = menuHTML;
    document.body.appendChild(menu);
    
    // Menüyü göster
    setTimeout(() => menu.classList.add('show'), 10);
    
    // Butonu aktif yap
    const sortBtn = document.getElementById('sortBtn');
    if (sortBtn) sortBtn.classList.add('active');
    
    // Dışarı tıklayınca kapat
    setTimeout(() => {
        document.addEventListener('click', function closeSortMenu(e) {
            if (!menu.contains(e.target) && e.target.id !== 'sortBtn') {
                menu.classList.remove('show');
                document.getElementById('sortBtn')?.classList.remove('active');
                setTimeout(() => menu.remove(), 200);
                document.removeEventListener('click', closeSortMenu);
            }
        });
    }, 100);
}

// Sıralama tipini değiştir
function changeSort(type) {
    sortConfig.type = type;
    localStorage.setItem('khoj_sort_type', type);
    
    // Menüyü güncelle ve render'ı yenile
    openSortMenu(); // Menüyü yeniden aç (aktif öğeyi göstermek için)

// Sıralama yönünü değiştir (asc/desc)
function toggleSortDirection(type) {
    // Eğer farklı bir tipe tıklandıysa, önce tipi değiştir
    if (type !== sortConfig.type) {
        sortConfig.type = type;
        sortConfig.direction = 'desc'; // Varsayılan
    } else {
        // Aynı tip için yönü değiştir
        sortConfig.direction = sortConfig.direction === 'desc' ? 'asc' : 'desc';
    }
    
    localStorage.setItem('khoj_sort_type', sortConfig.type);
    localStorage.setItem('khoj_sort_dir', sortConfig.direction);
    
    // Menüyü güncelle
    openSortMenu();
    render(); // Haberleri yeniden sırala ve göster
    
    const dirText = sortConfig.direction === 'desc' ? 'Azalan' : 'Artan';
    showToast(`📊 ${getSortLabel(sortConfig.type)} (${dirText})`);
}

// Sıralama etiketini getir
function getSortLabel(type) {
    const labels = {
        'date': 'Tarih',
        'source': 'Kaynak',
        'title': 'Başlık'
    };
    return labels[type] || type;
}

// Haberleri sırala (render fonksiyonu içinde kullanılacak)
function sortNews(newsArray) {
    return [...newsArray].sort((a, b) => {
        let comparison = 0;
        
        switch(sortConfig.type) {
            case 'date':
                // Tarihe göre sırala
                const dateA = a.pubDate ? new Date(a.pubDate).getTime() : 0;
                const dateB = b.pubDate ? new Date(b.pubDate).getTime() : 0;
                comparison = dateA - dateB;
                break;
                
            case 'source':
                // Kaynağa göre sırala
                comparison = (a.source || '').localeCompare(b.source || '');
                break;
                
            case 'title':
                // Başlığa göre sırala
                comparison = (a.title || '').localeCompare(b.title || '');
                break;
                
            default:
                return 0;
        }
        
        // Yönü uygula (desc: büyükten küçüğe, asc: küçükten büyüğe)
        return sortConfig.direction === 'desc' ? -comparison : comparison;
    });
}

function metniTemizle(hamMetin) {
    let temiz = hamMetin.replace(/␃🔚␗/g, '').replace(/\{"organic":[\s\S]*?\}\}/g, '').replace(/\{"peopleAlso":[\s\S]*?\}\}/g, '').replace(/"organic":\s*\[[\s\S]*?\]/g, '').replace(/"codeContext":\s*\{[\s\S]*?\}/g, '').replace(/"position":\s*\d+/g, '').replace(/\{.*?\}/g, '');
    const ilkHarf = temiz.search(/[A-ZİĞÜŞÖÇ]/);
    if (ilkHarf !== -1) { temiz = temiz.substring(ilkHarf); }
    temiz = temiz.replace(/[\s\}\]奉",:]{2,}$/g, '');
    temiz = temiz.replace(/^#{1,6}\s+(.*)$/gm, '<b style="color:#ef4444; font-size:1.1em;">$1</b>');
    return temiz.replace(/\[\d+\]\(.*?\)/g, '').replace(/\*\*(.*?)\*\*/g, '<b style="color:#ef4444;">$1</b>').replace(/^\s*[\-\*]\s+/gm, '🔹 ').replace(/\n/g, '<br>');
}

let rssListesi = {};

async function fetchAllNews() {
    news = []; 
    const proxyUrl = "https://wild-sky-08d7.06mmt8129.workers.dev/?url=";
    
    const cachedData = localStorage.getItem('khoj_news_cache');
    const cacheTime = localStorage.getItem('khoj_news_time');
    const now = new Date().getTime();
    const birSaat = 60 * 60 * 1000;

    if (cachedData && cacheTime && (now - cacheTime < birSaat)) {
        console.log("Haberler hafızadan yükleniyor...");
        news = JSON.parse(cachedData);
        render();
        buildSourceBar(); // YENİ: Kaynak barını güncelle
        return;
    }
    
    document.getElementById('newsFeed').innerHTML = '<div style="text-align:center; padding:50px; color:var(--text);">Haberler Cloudflare hattından geliyor...</div>';

    for (const id in rssListesi) {
        const rss = rssListesi[id];
        try {
            console.log(`${rss.ad} yükleniyor...`);
            const response = await fetch(proxyUrl + encodeURIComponent(rss.url));
            const xmlText = await response.text();
            
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "text/xml");
            
            const items = xmlDoc.querySelectorAll("item, entry");
            console.log(`${rss.ad}: ${items.length} haber bulundu`);

            items.forEach((el, index) => {
                const title = el.querySelector("title")?.textContent || "";
                let link = el.querySelector("link")?.textContent || 
                          el.querySelector("link")?.getAttribute("href") || "";
                
                const date = el.querySelector("pubDate")?.textContent || 
                          el.querySelector("dc\\:date")?.textContent ||
                          el.querySelector("date")?.textContent || 
                          el.querySelector("lastBuildDate")?.textContent || 
                          "";

                // === GELİŞTİRİLMİŞ RESİM BULMA ===
                let img = "";
                
                // 1. Mynet özel etiketleri (ipimage, img640x360, img300x300)
                const mynetImg = el.querySelector("ipimage")?.textContent || 
                                el.querySelector("img640x360")?.textContent ||
                                el.querySelector("img300x300")?.textContent;
                if (mynetImg) {
                    img = mynetImg;
                    console.log(`${rss.ad} - Mynet ipimage bulundu:`, img.substring(0, 50));
                }
                
                // 2. Media content (standart RSS)
                if (!img) {
                    const mediaContent = el.querySelector("media\\:content") || 
                                        el.getElementsByTagNameNS("http://search.yahoo.com/mrss/", "content")[0];
                    if (mediaContent) {
                        img = mediaContent.getAttribute("url") || mediaContent.getAttribute("src") || "";
                    }
                }
                
                // 3. Media thumbnail
                if (!img) {
                    const mediaThumb = el.querySelector("media\\:thumbnail") || 
                                      el.getElementsByTagNameNS("http://search.yahoo.com/mrss/", "thumbnail")[0];
                    if (mediaThumb) {
                        img = mediaThumb.getAttribute("url") || mediaThumb.getAttribute("src") || "";
                    }
                }
                
                // 4. Enclosure
                if (!img) {
                    const enclosure = el.querySelector("enclosure");
                    if (enclosure && enclosure.getAttribute("type")?.startsWith("image/")) {
                        img = enclosure.getAttribute("url") || "";
                    }
                }
                
                // 5. Content:encoded içindeki ilk resmi bul
                if (!img) {
                    const contentEncoded = el.querySelector("content\\:encoded") || 
                                         el.getElementsByTagNameNS("http://purl.org/rss/1.0/modules/content/", "encoded")[0];
                    if (contentEncoded?.textContent) {
                        // Tüm img etiketlerini bul
                        const imgRegex = /<img[^>]+src=["']([^"']+)["'][^>]*>/gi;
                        const matches = [...contentEncoded.textContent.matchAll(imgRegex)];
                        
                        // İkon veya logo olmayan ilk resmi al
                        for (const match of matches) {
                            const imgUrl = match[1];
                            if (!imgUrl.includes('icon') && !imgUrl.includes('logo') && !imgUrl.includes('avatar')) {
                                img = imgUrl;
                                break;
                            }
                        }
                        
                        // Eğer hala bulunamadıysa, ilk resmi al
                        if (!img && matches.length > 0) {
                            img = matches[0][1];
                        }
                    }
                }
                
                // 6. Description içindeki resmi bul (ShiftDelete için)
                if (!img) {
                    const description = el.querySelector("description");
                    if (description?.textContent) {
                        // HTML entity'leri düzelt
                        let descText = description.textContent
                            .replace(/&lt;/g, '<')
                            .replace(/&gt;/g, '>')
                            .replace(/&quot;/g, '"')
                            .replace(/&amp;/g, '&');
                        
                        // img etiketlerini ara
                        const imgRegex = /<img[^>]+src=["']([^"']+)["'][^>]*>/gi;
                        const matches = [...descText.matchAll(imgRegex)];
                        
                        for (const match of matches) {
                            const imgUrl = match[1];
                            if (imgUrl && !imgUrl.includes('data:image') && !imgUrl.includes('icon')) {
                                img = imgUrl;
                                break;
                            }
                        }
                        
                        // Eğer hala bulunamadıysa, doğrudan resim URL'si ara
                        if (!img) {
                            const urlMatch = descText.match(/(https?:\/\/[^\s"']+\.(jpg|jpeg|png|gif|webp))/i);
                            if (urlMatch) {
                                img = urlMatch[1];
                            }
                        }
                    }
                }
                
                // 7. image etiketi
                if (!img) {
                    const imageTag = el.querySelector("image url, image");
                    if (imageTag) {
                        img = imageTag.textContent || imageTag.getAttribute("url") || "";
                    }
                }
                
                // === URL DÜZENLEMELERİ ===
                if (img) {
                    // HTML entity'leri temizle
                    img = img.replace(/&amp;/g, '&')
                             .replace(/&lt;/g, '<')
                             .replace(/&gt;/g, '>')
                             .replace(/&quot;/g, '"')
                             .replace(/&#039;/g, "'");
                    
                    // Tırnak işaretlerini temizle
                    img = img.replace(/['"]/g, '');
                    
                    // Göreceli URL'leri tam URL'ye çevir
                    if (img.startsWith('/')) {
                        try {
                            const baseUrl = new URL(rss.url).origin;
                            img = baseUrl + img;
                        } catch (e) {
                            const domainMatch = rss.url.match(/^(https?:\/\/[^\/]+)/);
                            if (domainMatch) {
                                img = domainMatch[1] + img;
                            }
                        }
                    }
                    
                    // HTTP'yi HTTPS yap (güvenli bağlantı için)
                    if (img.startsWith('http:')) {
                        img = 'https:' + img.substring(5);
                    }
                    
                    // URL'de boşluk varsa encode et
                    img = img.replace(/ /g, '%20');
                }
                
                // === VARSAYILAN LOGO ===
                const defaultLogo = rss.logo || "https://mmt8129.github.io/Gem/rsslogo.png";
                
                if (title && title.length > 5) {
                    const newsItem = {
                        title: title.trim(),
                        link: link.trim(),
                        source: rss.ad,
                        category: rss.kategori || "GÜNDEM",
                        pubDate: date,
                        thumbnail: img || defaultLogo
                    };
                    
                    news.push(newsItem);
                    
                    // Debug için log
                    if (!img) {
                        console.log(`⚠️ ${rss.ad} - Resim bulunamadı! Başlık: ${title.substring(0, 50)}`);
                    } else if (index < 3) {
                        console.log(`✅ ${rss.ad} - Resim bulundu: ${img.substring(0, 50)}`);
                    }
                }
            });
            
        } catch (e) {
            console.log(`${rss.ad} bağlantı sorunu:`, e);
        }
    }
    
    // Haberleri karıştır
    news.sort(() => Math.random() - 0.5);
    
    // Önbelleğe al
    localStorage.setItem('khoj_news_cache', JSON.stringify(news));
    localStorage.setItem('khoj_news_time', new Date().getTime());
    
    console.log(`Toplam ${news.length} haber yüklendi`);
    render(); 
    buildSourceBar(); // YENİ: Kaynak barını oluştur
}

function render() {
    const f = document.getElementById('newsFeed');
    if(!f) return;

    const activeBtn = document.querySelector('.cat-item.active');
    const currentCategory = activeBtn ? activeBtn.innerText.trim().toUpperCase() : "TÜMÜ";

    // Kategoriye göre filtrele

        if (currentCategory === "TÜMÜ") return true;
        const haberKategorisi = n.category ? n.category.trim().toUpperCase() : "";
        return haberKategorisi === currentCategory;
    });
    
    // YENİ: Kaynak filtresini uygula
    if (activeSourceFilter) {
        filteredNews = filteredNews.filter(n => n.source === activeSourceFilter);
    }

    // SIRALAMA UYGULA
    filteredNews = sortNews(filteredNews);

    if (filteredNews.length === 0) {
        f.innerHTML = `
            <div style="text-align:center; padding:50px; color:var(--text);">
                <div style="font-size:48px; margin-bottom:20px;">📂</div>
                <div style="font-size:18px; font-weight:600;">${currentCategory} kategorisinde haber yok</div>
                <div style="font-size:14px; color:var(--muted); margin-top:10px;">Farklı bir kategori seçmeyi dene</div>
            </div>`;
        return;
    }

    const displayedNews = filteredNews.slice(0, visibleCount);

    f.innerHTML = displayedNews.map((n) => {
        const realIdx = news.findIndex(x => x.title === n.title);
        
        // Tarihi formatla
        let displayDate = '';
        if (n.pubDate) {
            const d = new Date(n.pubDate);
            if (!isNaN(d.getTime())) {
                displayDate = d.toLocaleDateString('tr-TR', {

                    month: 'short',

    return `

        <img src="${n.thumbnail || 'https://mmt8129.github.io/Gem/rsslogo.png'}" 
             onerror="this.onerror=null; this.src='https://mmt8129.github.io/Gem/rsslogo.png';"

            </div>
            <div class="news-title">${n.title}</div>
        </div>

    }).join('');

    if (filteredNews.length > visibleCount) {

                    ➕ DAHA FAZLA GÖSTER (${filteredNews.length - visibleCount} HABER DAHA)

    }
}

function getBestImage(item, sourceName) {
    if (item.enclosure && item.enclosure.link) return item.enclosure.link;
    if (item.thumbnail) return item.thumbnail;
    
    if (item.description && item.description.includes('<img')) {
        const match = /<img[^>]+src="([^">]+)"/g.exec(item.description);
        if (match && match[1]) return match[1];
    }

    let kaynakLogosu = "";
    Object.values(rssListesi).forEach(r => {
        if(r.ad === sourceName) kaynakLogosu = r.logo;
    });

    return kaynakLogosu || `https://ui-avatars.com/api/?name=${sourceName}&background=random&color=fff&size=200`;
}

function adjustContent(type, val) {
    if(type === 'size') {
        sets.contentSize = Math.max(10, Math.min(24, (sets.contentSize || 14) + val));
        document.documentElement.style.setProperty('--content-size', sets.contentSize + 'px');

        sets.contentLineHeight = Math.max(1.2, Math.min(2.5, (sets.contentLineHeight || 1.6) + val));
        document.documentElement.style.setProperty('--content-line-height', sets.contentLineHeight);
    }

    openSettings();
}

// YENİ: Kaynak barını oluştur
function buildSourceBar() {
    const sourceBar = document.getElementById('sourceBar');
    if (!sourceBar) return;
    
    const sourceCounts = {};
    news.forEach(item => {
        if (item.source) {
            sourceCounts[item.source] = (sourceCounts[item.source] || 0) + 1;
        }
    });
    
    const sourceList = Object.keys(sourceCounts);
    let html = '';
    sourceList.forEach(src => {
        const activeClass = (activeSourceFilter === src) ? 'active' : '';
        html += `<div class="source-item ${activeClass}" onclick="filterBySource('${src.replace(/'/g, "\\'")}')">${src} (${sourceCounts[src]})</div>`;
    });
    sourceBar.innerHTML = html;
}

// YENİ: Kaynağa göre filtrele
function filterBySource(source) {
    if (activeSourceFilter === source) {
        activeSourceFilter = null;
        document.querySelectorAll('.source-item').forEach(btn => btn.classList.remove('active'));
    } else {
        activeSourceFilter = source;
        document.querySelectorAll('.source-item').forEach(btn => btn.classList.remove('active'));
        const activeBtn = Array.from(document.querySelectorAll('.source-item')).find(btn => btn.innerText.startsWith(source));
        if (activeBtn) activeBtn.classList.add('active');
        
        // Kategori çubuğunda TÜMÜ'yü aktif yap
        document.querySelectorAll('.cat-item').forEach(btn => btn.classList.remove('active'));
        const tumBtn = Array.from(document.querySelectorAll('.cat-item')).find(btn => btn.innerText.trim() === 'TÜMÜ');
        if (tumBtn) tumBtn.classList.add('active');
    }
    render();
}

// YENİ: Modal stack yönetimi
function pushModal(state) {
    modalStack.push(state);
}

function popModal() {
    return modalStack.pop();
}

// Haberin kayıtlı olup olmadığını kontrol et
function isNewsSaved(title) {
    const saved = JSON.parse(localStorage.getItem('khoj_saved_news') || '[]');
    return saved.some(item => item.title === title);
}

// Kayıtlı haberin sohbetini güncelle
function updateSavedChat(title, newChat) {
    let saved = JSON.parse(localStorage.getItem('khoj_saved_news') || '[]');
    const index = saved.findIndex(item => item.title === title);
    if (index !== -1) {
        saved[index].savedChat = newChat;
        localStorage.setItem('khoj_saved_news', JSON.stringify(saved));
    }
}

// Kayıtlı haberin fullContent'ini güncelle (gerekirse)
function updateSavedFullContent(title, fullContent) {
    let saved = JSON.parse(localStorage.getItem('khoj_saved_news') || '[]');
    const index = saved.findIndex(item => item.title === title);
    if (index !== -1) {
        saved[index].fullContent = fullContent;
        localStorage.setItem('khoj_saved_news', JSON.stringify(saved));
    }
}

// Bekleyen cevapları göster (ANCAK MESAJLARI SİLMEZ)
function showPendingResponses() {
    const pendingResponses = JSON.parse(localStorage.getItem('pending_ai_responses') || '[]');
    if (pendingResponses.length === 0) return;
    
    const box = document.getElementById('cBox');
    if (!box) return;
    
    // "Bekleyen cevaplar" başlığı
    const header = document.createElement('div');
    header.className = 'msg ai';
    header.style.cssText = 'background:rgba(239,68,68,0.2); text-align:center; font-weight:bold; padding:10px; border-radius:12px; margin-bottom:15px;';
    header.innerHTML = `📨 **${pendingResponses.length} YENİ CEVAP GELDİ** (aşağıda listeleniyor)`;
    box.appendChild(header);
    
    // Her bekleyen cevabı göster
    pendingResponses.forEach((item, index) => {
        const date = new Date(item.timestamp).toLocaleString('tr-TR');
        
        const msg = document.createElement('div');
        msg.className = 'msg ai notification';
        msg.id = `pending-response-${item.id}`;  // <-- BURASI ÖNEMLİ (id ekle)

        // Eğer zaten okunmuşsa normal göster
        if (item.isRead) {
            msg.classList.remove('notification');
            msg.style.cssText = 'background:var(--card-bg); border-left:none; margin-bottom:12px; border-radius:12px; padding:12px;';
            msg.innerHTML = `
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <span style="font-size:11px; color:var(--muted);">${date}</span>
                </div>
                <div style="font-size:13px; margin-bottom:8px;">
                    <strong>Siz:</strong> ${item.question}
                </div>
                <div style="padding:8px; background:var(--bg); border-radius:8px;">
                    ${item.answer}
                </div>
            `;
        } else {
            // Okunmamışsa bildirim olarak göster
            msg.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                    <div>
                        <span style="font-weight:bold; color:#ef4444; background:rgba(239,68,68,0.2); padding:4px 12px; border-radius:20px; font-size:12px;">📨 YENİ ${index+1}</span>

                </div>
                <div style="font-size:13px; margin-bottom:12px; background:rgba(0,0,0,0.03); padding:10px; border-radius:8px;">
                    <strong style="color:#ef4444;">Siz:</strong> ${item.question}
                </div>
                <div style="padding:12px; background:white; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.05);">
                    ${item.answer}
                </div>
                <div style="display:flex; justify-content:flex-end; margin-top:12px;">
                    <button onclick="markNotificationAsRead(${item.id})" 
                        style="padding:6px 16px; background:#ef4444; color:white; border:none; border-radius:20px; font-size:12px; font-weight:bold; cursor:pointer; transition:all 0.2s;">
                        ✓ Bildirimi Temizle
                    </button>
                </div>
            `;
        }
        box.appendChild(msg);
    });
    
    scrollToBottom('smooth');
}



// Cevabı okundu olarak işaretle
function removePendingResponse(id) {
    let pendingResponses = JSON.parse(localStorage.getItem('pending_ai_responses') || '[]');
    pendingResponses = pendingResponses.filter(item => item.id !== id);
    localStorage.setItem('pending_ai_responses', JSON.stringify(pendingResponses));
    
    // Rozeti güncelle
    if (pendingResponses.length > 0) {
        addNotificationBadge(pendingResponses.length);
    } else {
        const badge = document.getElementById('aiNotificationBadge');
        if (badge) badge.remove();
    }
    
    // Sayfayı yenilemeden gösterimi güncelle
    const modal = document.getElementById('ovl');
    if (modal.style.display === 'flex' && active && active.source === "KHOJ") {
        // Aynı sayfada kalmak için mevcut sohbeti yeniden aç
        const currentActive = active;
        openGeneralChat();
        setTimeout(() => {
            showPendingResponses();
        }, 300);
    } else {
        showToast('Cevap okundu olarak işaretlendi');
    }
}

function markNotificationAsRead(id) {
    let pendingResponses = JSON.parse(localStorage.getItem('pending_ai_responses') || '[]');
    
    // Bu id'yi "okundu" olarak işaretle (ama silme)
    const updatedResponses = pendingResponses.map(item => {
        if (item.id === id) {
            return { ...item, isRead: true };
        }
        return item;
    });
    
    localStorage.setItem('pending_ai_responses', JSON.stringify(updatedResponses));
    
    // Hala okunmamış bildirim var mı kontrol et
    const unreadCount = updatedResponses.filter(item => !item.isRead).length;
    
    // Rozeti güncelle (sadece okunmamışları göster)
    if (unreadCount > 0) {
        addNotificationBadge(unreadCount);
    } else {
        const badge = document.getElementById('aiNotificationBadge');
        if (badge) badge.remove();
    }
    
    // Butonun yazısını değiştir (geri bildirim)
    const btn = event.target;
    btn.textContent = '✓ Temizlendi';
    btn.style.background = '#22c55e';
    btn.disabled = true;
    
    showToast('Bildirim temizlendi, mesaj duruyor');
}

// Haber detayında resimleri bul
function extractImagesFromNews(newsItem) {
    let images = [];
    
    // 1. Ana thumbnail varsa ekle
    if (newsItem.thumbnail && newsItem.thumbnail !== 'logo.png' && newsItem.thumbnail !== 'varsayilan-logo.png') {
        images.push(newsItem.thumbnail);
    }
    
    // 2. Açıklamadan resimleri bul
    if (newsItem.description) {
        const imgRegex = /<img[^>]+src="([^">]+)"/g;
        let match;
        while ((match = imgRegex.exec(newsItem.description)) !== null) {
            if (!images.includes(match[1])) {
                images.push(match[1]);
            }
        }
    }
    
    // 3. Eğer hiç resim yoksa, varsayılan logo
    if (images.length === 0) {
        images.push('logo.png');
    }
    
    return images;
}

// openGallery fonksiyonunu güncelle
function openGallery(images, startIndex) {
    console.log("openGallery çağrıldı:", images, startIndex);
    
    if (!images || images.length === 0) {
        console.log("Resim yok");
        return;
    }
    
    if (typeof images === 'string') {
        try {
            images = JSON.parse(images);
        } catch (e) {
            console.log("JSON parse hatası:", e);
            return;
        }
    }
    
    currentImages = images;
    currentImageIndex = startIndex;
    
    const viewer = document.getElementById('imageViewer');
    const viewerImage = document.getElementById('viewerImage');
    const thumbnailStrip = document.getElementById('thumbnailStrip');
    const counter = document.getElementById('imageCounter');
    const prevBtn = document.getElementById('prevImageBtn');
    const nextBtn = document.getElementById('nextImageBtn');
    
    if (!viewer || !viewerImage) {
        console.log("Görüntüleyici elemanları bulunamadı!");
        return;
    }
    
    // Zoom'u sıfırla
    viewerImage.style.transform = 'scale(1)';
    viewerImage.style.transition = 'transform 0.2s ease';
    currentScale = 1;
    initialDistance = 0;
    
    // Ana resmi göster
    viewerImage.src = images[startIndex];
    
    // Pinch zoom'u ayarla
    setTimeout(() => {
        setupPinchZoom();
    }, 100);
    
    // Sayaçı güncelle
    if (counter) {
        counter.textContent = `${startIndex + 1}/${images.length}`;
    }
    
    // Önceki/sonraki butonlarını göster/gizle
    if (prevBtn && nextBtn) {
        if (images.length <= 1) {
            prevBtn.style.display = 'none';
            nextBtn.style.display = 'none';
        } else {
            prevBtn.style.display = 'flex';
            nextBtn.style.display = 'flex';
        }
    }
    
    // Küçük resimleri oluştur
    if (thumbnailStrip) {
        thumbnailStrip.innerHTML = '';
        images.forEach((img, idx) => {
            const thumb = document.createElement('img');
            thumb.src = img;
            thumb.className = `thumb-img ${idx === startIndex ? 'active' : ''}`;
            thumb.onclick = (e) => {
                e.stopPropagation();
                navigateToImage(idx);
            };
            thumb.onerror = () => { thumb.src = 'logo.png'; };
            thumbnailStrip.appendChild(thumb);
        });
    }
    
    viewer.classList.add('show');
}

// Galeride gezinme
function navigateGallery(direction) {
    if (currentImages.length <= 1) return;
    
    currentImageIndex += direction;
    
    // Döngüsel gezinme
    if (currentImageIndex < 0) {
        currentImageIndex = currentImages.length - 1;
    } else if (currentImageIndex >= currentImages.length) {
        currentImageIndex = 0;
    }
    
    navigateToImage(currentImageIndex);
}

// navigateToImage fonksiyonunu güncelle (zoom'u sıfırla)
function navigateToImage(index) {
    if (index < 0 || index >= currentImages.length) return;
    
    currentImageIndex = index;
    
    const viewerImage = document.getElementById('viewerImage');
    const counter = document.getElementById('imageCounter');
    const thumbnails = document.querySelectorAll('.thumb-img');
    
    if (!viewerImage) return;
    
    // Zoom'u sıfırla (yeni resimde)
    viewerImage.style.transform = 'scale(1)';
    viewerImage.style.transition = 'transform 0.2s ease';
    currentScale = 1;
    initialDistance = 0;
    
    // Resmi güncelle
    viewerImage.src = currentImages[index];
    
    // Sayaçı güncelle
    if (counter) {
        counter.textContent = `${index + 1}/${currentImages.length}`;
    }
    
    // Küçük resimleri güncelle
    thumbnails.forEach((thumb, idx) => {
        if (idx === index) {
            thumb.classList.add('active');
            thumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        } else {
            thumb.classList.remove('active');
        }
    });
}

// Resmi kaydet (güncellenmiş)
async function downloadCurrentImage(event) {
    event.stopPropagation();
    
    const viewerImage = document.getElementById('viewerImage');
    const imageSrc = viewerImage.src;
    
    if (!imageSrc || imageSrc === '') return;
    
    const btn = document.getElementById('downloadImageBtn');
    btn.style.transform = 'scale(1.2)';
    setTimeout(() => btn.style.transform = 'scale(1)', 200);
    
    try {
        const response = await fetch(imageSrc);
        const blob = await response.blob();
        const blobUrl = window.URL.createObjectURL(blob);
        
        const link = document.createElement('a');
        link.href = blobUrl;
        link.download = 'haber-resmi-' + Date.now() + '.jpg';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        window.URL.revokeObjectURL(blobUrl);
        showToast('✅ Resim kaydedildi!');
        
        btn.style.backgroundColor = '#22c55e';
        setTimeout(() => btn.style.backgroundColor = '', 500);
        
    } catch (error) {
        const a = document.createElement('a');
        a.href = imageSrc;
        a.download = 'haber-resmi-' + Date.now() + '.jpg';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        showToast('✅ Resim kaydedildi!');
    }
}

}

    const fullContent = document.getElementById('dynamicContent')?.innerText || active.description || '';

    };

        }

function closeSavedList() {
    // Stack'ten savedList modalını çıkar
    if (modalStack.length > 0 && modalStack[modalStack.length - 1].type === 'savedList') {
        modalStack.pop();
    }
    
    // Eğer stack'te başka modal varsa onu göster
    if (modalStack.length > 0) {
        const lastModal = modalStack[modalStack.length - 1];
        if (lastModal.type === 'sourceList' && lastModal.sourceName) {
            openSourceNewsList(lastModal.sourceName);
        } else if (lastModal.type === 'newsDetail' && lastModal.newsItem) {
            active = lastModal.newsItem;
            openDetail(-2);
        } else if (lastModal.type === 'search' && lastModal.query) {
            performLocalNewsSearch(lastModal.query, true);
        } else if (lastModal.type === 'settings') {
            openSettings(true);
        } else if (lastModal.type === 'rssManager') {
            openRSSManager(true);
        } else {
            document.getElementById('ovl').style.display = 'none';
            document.getElementById('mdl').classList.remove('fullscreen-chat');
            document.body.style.overflow = '';
        }
    } else {
        document.getElementById('ovl').style.display = 'none';
        document.getElementById('mdl').classList.remove('fullscreen-chat');
        document.body.style.overflow = '';
    }
}

function handleMainInput() {
    const inp = document.getElementById('mainInp');
    if (!inp || !inp.value.trim()) return;

    const val = inp.value.trim();
    
    const searchRegex = /\*(.*?)\*/; 
    const match = val.match(searchRegex);

    if (match) {
        const query = match[1].trim();
        performLocalNewsSearch(query);
    } else {
        openGeneralChatWithText(val);

    inp.value = '';

    const results = news.filter(n => n.title.toLowerCase().includes(q.toLowerCase()) || (n.description && n.description.toLowerCase().includes(q.toLowerCase())) );
    activeSearchQuery = q; 
    const m = document.getElementById('mdl');
    let html = ` <div class="modal-header"> <div style="display:flex; justify-content:space-between; align-items:center; width:100%;"> <div> <h2 style="font-size:1.1rem;">🔍 ARAMA SONUÇLARI</h2> <p style="font-size:11px; opacity:0.7;">"${q}" kelimesi geçen haberler</p> </div> <span class="search-count">${results.length} HABER BULUNDU</span> <button class="btn-icon" onclick="event.stopPropagation(); closeSearch()" style="background:rgba(239,68,68,0.2); color:#ef4444;">❌</button> </div> </div> <div class="modal-body">`; 
    if (results.length === 0) { html += `<p style="text-align:center; padding:40px; color:#888;">Aradığın kriterde haber bulamadım ABİ. 😔</p>`; } 
    else { results.forEach(n => { const realIdx = news.findIndex(x => x.title === n.title); html += ` <div class="news-card" onclick="openDetail(${realIdx})" style="margin-bottom:10px; cursor:pointer;"> <img src="${n.thumbnail || 'logo.png'}" style="width:50px; height:50px;"> <div style="flex:1"> <div class="news-meta"><span>${n.source}</span></div> <div class="news-title" style="font-size:0.85rem;">${n.title}</div> </div> </div>`; }); } 
    html += `</div><div class="modal-footer"> <button class="btn-full" onclick="closeSearch()">KAPAT</button> </div>`; 
    m.innerHTML = html; 
    document.getElementById('ovl').style.display = 'flex';
    document.body.style.overflow = 'hidden';
    
    if (!fromStack) {
        pushModal({ type: 'search', query: q });

// ==================== YAKINLAŞTIRMA/UZAKLAŞTIRMA FONKSİYONLARI ====================
let initialDistance = 0;
let currentScale = 1;
let lastTouchX = 0;
let lastTouchY = 0;
let isDragging = false;

function setupPinchZoom() {
    const viewerImage = document.getElementById('viewerImage');
    if (!viewerImage) return;
    
    // Touch başlangıcı
    viewerImage.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            // İki parmakla dokunma - YAKINLAŞTIRMA
            e.preventDefault();
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            initialDistance = Math.sqrt(dx * dx + dy * dy);
            
            // Mevcut scale'i al
            const transform = viewerImage.style.transform;
            if (transform.includes('scale')) {
                const match = transform.match(/scale\(([^)]+)\)/);
                if (match) {
                    currentScale = parseFloat(match[1]);
                }
            }
            
            console.log("Zoom başladı, mevcut scale:", currentScale);
        } else if (e.touches.length === 1) {
            // Tek parmakla dokunma - KAYDIRMA (sadece zoom yapıldıysa)
            lastTouchX = e.touches[0].clientX;
            lastTouchY = e.touches[0].clientY;
            isDragging = true;
        }
    }, { passive: false });
    
    // Touch hareketi
    viewerImage.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2) {
            // İki parmak - YAKINLAŞTIRMA/UZAKLAŞTIRMA
            e.preventDefault();
            
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            const currentDistance = Math.sqrt(dx * dx + dy * dy);
            
            if (initialDistance > 0) {
                // Scale hesapla: 0.5x ile 3x arası (uzaklaştırma da olsun)
                let scale = (currentDistance / initialDistance) * currentScale;
                scale = Math.max(0.5, Math.min(3, scale)); // Min 0.5x, max 3x
                
                // Scale'i uygula
                viewerImage.style.transform = `scale(${scale})`;
                viewerImage.style.transition = 'none'; // Anında zoom
            }
        } else if (e.touches.length === 1 && isDragging && currentScale > 1) {
            // Tek parmak - KAYDIRMA (sadece zoom yapıldıysa)
            e.preventDefault();
            
            const touchX = e.touches[0].clientX;
            const touchY = e.touches[0].clientY;
            
            const deltaX = touchX - lastTouchX;
            const deltaY = touchY - lastTouchY;
            
            // Mevcut transform'u al
            let transform = viewerImage.style.transform;
            let translateX = 0, translateY = 0;
            
            if (transform.includes('translate')) {
                const matches = transform.match(/translate\(([^,]+)px,\s*([^)]+)px\)/);
                if (matches) {
                    translateX = parseFloat(matches[1]) || 0;
                    translateY = parseFloat(matches[2]) || 0;
                }
            }
            
            // Yeni pozisyon
            translateX += deltaX;
            translateY += deltaY;
            
            viewerImage.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentScale})`;
            
            lastTouchX = touchX;
            lastTouchY = touchY;
        }
    }, { passive: false });
    
    // Touch bitişi - BURASI KRİTİK: Scale'i KALICI yap
    viewerImage.addEventListener('touchend', (e) => {
        if (e.touches.length === 0) {
            // İki parmak kalktığında mevcut scale'i KORU
            const transform = viewerImage.style.transform;
            if (transform.includes('scale')) {
                const match = transform.match(/scale\(([^)]+)\)/);
                if (match) {
                    currentScale = parseFloat(match[1]);
                    console.log("Zoom bitti, yeni scale:", currentScale);
                }
            }
            
            initialDistance = 0;
            isDragging = false;
            
            // Smooth transition ekle (kaydırma için)
            viewerImage.style.transition = 'transform 0.2s ease';
        } else if (e.touches.length === 1) {
            // Bir parmak kaldıysa kaydırmaya devam et
            lastTouchX = e.touches[0].clientX;
            lastTouchY = e.touches[0].clientY;
        }
    }, { passive: true });
    
    // Çift tıklama ile zoom sıfırlama
    viewerImage.addEventListener('dblclick', (e) => {
        e.preventDefault();
        viewerImage.style.transform = 'scale(1)';
        viewerImage.style.transition = 'transform 0.3s ease';
        currentScale = 1;
        initialDistance = 0;
        console.log("Zoom sıfırlandı");
    });
}

        closeM();
    }
    return false;
}, false);

function wrapModalOpen(originalFn) {
    return function() {
        history.pushState(null, null, location.href);
        return originalFn.apply(this, arguments);
    };
}

const modalFunctions = [
    'openDetail', 
    'openSettings', 
    'openRSSManager', 
    'openSavedList', 
    'openSourceNewsList', 
    'showPendingList', 
    'performLocalNewsSearch',
    'openAddRSS',
    'editRSS',
    'openSourceListModal'
];
modalFunctions.forEach(fnName => {
    if (typeof window[fnName] === 'function') {
        const original = window[fnName];
        window[fnName] = function() {
            history.pushState(null, null, location.href);
            return original.apply(this, arguments);
        };
    }
});

window.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
        updateSavedButton();
    }, 500);
});

</script>
